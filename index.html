<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INOVA Energy — LinkedIn Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-green: #006B3F;
            --accent-green: #00A86B;
            --bg-dark: #0f1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --success: #00A86B;
            --danger: #f85149;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, var(--primary-green), var(--accent-green));
            padding: 1.25rem 2rem;
            box-shadow: 0 4px 12px rgba(0, 107, 63, 0.25);
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header-logo {
            background: white;
            border-radius: 6px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
        }
        .header-logo img {
            height: 44px;
            width: auto;
            display: block;
        }
        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.6rem;
        }
        .header-subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.85);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        /* Period controls */
        .period-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .period-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.75);
            font-weight: 500;
            margin-right: 0.25rem;
        }
        .period-btn {
            padding: 0.3rem 0.75rem;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.9);
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .period-btn:hover { background: rgba(255,255,255,0.22); }
        .period-btn.active {
            background: rgba(255,255,255,0.95);
            color: var(--primary-green);
            font-weight: 700;
            border-color: white;
        }
        .custom-range {
            display: none;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.4rem;
            flex-wrap: wrap;
        }
        .custom-range.visible { display: flex; }
        .custom-range input[type="date"] {
            padding: 0.3rem 0.6rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            color-scheme: dark;
        }
        .custom-range span { color: rgba(255,255,255,0.7); font-size: 0.8rem; }
        .apply-btn {
            padding: 0.3rem 0.75rem;
            background: rgba(255,255,255,0.95);
            color: var(--primary-green);
            border: none;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }
        .range-display {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
            margin-top: 0.2rem;
        }
        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }
        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            transition: all 0.3s ease;
        }
        .kpi-card:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 20px rgba(0, 168, 107, 0.15);
        }
        .kpi-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }
        .kpi-value {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 0.3rem;
        }
        .kpi-delta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        /* Tabs */
        .tabs-nav {
            display: flex;
            gap: 0.25rem;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-button {
            padding: 0.65rem 1.25rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab-button:hover { color: var(--text-primary); }
        .tab-button.active {
            color: var(--accent-green);
            border-bottom-color: var(--accent-green);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            position: relative;
            height: 320px;
        }
        .chart-container.small { height: 280px; }
        /* Table */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: rgba(0, 168, 107, 0.1); }
        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            white-space: nowrap;
        }
        td {
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        /* Analysis */
        .summary-block {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--accent-green);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 2rem 0 1rem;
        }
        .insights-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .insight-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            gap: 1rem;
        }
        .insight-card-icon { font-size: 1.5rem; flex-shrink: 0; }
        .insight-card-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.3rem; }
        .insight-card-detail { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }
        .post-insight {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .benchmark-note {
            padding: 1rem;
            background: rgba(0,168,107,0.08);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-badge.above { background: rgba(0,168,107,0.2); color: var(--success); }
        .status-badge.below { background: rgba(248,81,73,0.2); color: var(--danger); }
        .status-badge.equal { background: rgba(139,148,158,0.2); color: var(--text-secondary); }
        .recommendations-list ol { padding-left: 1.5rem; }
        .recommendations-list li {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .no-data {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }
        .error {
            background: rgba(248,81,73,0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 1.5rem;
            border-radius: 8px;
            margin: 2rem 0;
        }
        .section { margin-top: 2rem; }
        @media (max-width: 700px) {
            .header-content { flex-direction: column; align-items: flex-start; }
            .header-right { align-items: flex-start; }
            .charts-grid { grid-template-columns: 1fr; }
            .chart-container { height: 260px; }
        }
    </style>
</head>

    <script src="linkedin_data.js"></script>
    <script>
        // ─── CONFIG BASE DOS GRÁFICOS ─────────────────────────────────────────
        const BASE_CFG = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#8b949e', font: { size: 11 } } },
                title: { display: false, color: '#e6edf3', font: { size: 12, weight: '600' }, padding: { bottom: 12 } }
            },
            scales: {
                x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' }, border: { color: '#30363d' } },
                y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' }, border: { color: '#30363d' } }
            }
        };

        function cfgWithTitle(title, extra = {}) {
            return { ...BASE_CFG, ...extra, plugins: { ...BASE_CFG.plugins, ...extra.plugins, title: { ...BASE_CFG.plugins.title, display: true, text: title }, legend: extra.plugins?.legend ?? BASE_CFG.plugins.legend } };
        }

        let rawData = null;
        let charts = {};
        let currentStartDate = null;
        let currentEndDate = null;
        let activeRange = 'month';

        // ─── CARREGAMENTO DE DADOS ────────────────────────────────────────────
        async function loadData() {
            if (window.LINKEDIN_DATA) {
                rawData = window.LINKEDIN_DATA;
                initializeDashboard();
                return;
            }
            try {
                const resp = await fetch('linkedin_data.json').catch(() => fetch('./linkedin_data.json'));
                if (!resp.ok) throw new Error('Arquivo não encontrado');
                rawData = await resp.json();
                initializeDashboard();
            } catch (e) {
                document.body.innerHTML = `<div class="container" style="margin-top:2rem"><div class="error"><strong>Erro ao carregar dados:</strong> ${e.message}<p style="margin-top:1rem">Certifique-se de que <code>linkedin_data.js</code> e <code>linkedin_data.json</code> estão na mesma pasta do <code>index.html</code>.</p></div></div>`;
            }
        }

        // ─── UTILIDADES DE DATA ───────────────────────────────────────────────
        function parseLinkedInDate(str) {
            // Suporta MM/DD/YYYY e YYYY-MM-DD
            if (!str) return null;
            if (str.includes('-')) {
                const [y, m, d] = str.split('-');
                return new Date(+y, +m - 1, +d);
            }
            const [m, d, y] = str.split('/');
            return new Date(+y, +m - 1, +d);
        }

        function formatDisplayDate(dt) {
            return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatChartDate(str) {
            const dt = parseLinkedInDate(str);
            if (!dt) return str;
            return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        }

        // ─── INICIALIZAÇÃO ────────────────────────────────────────────────────
        function initializeDashboard() {
            // Descobre range total dos dados
            const allDays = getAllDailyContent();
            if (!allDays.length) { document.getElementById('rangeDisplay').textContent = 'Sem dados'; return; }

            const dates = allDays.map(d => parseLinkedInDate(d.date)).filter(Boolean).sort((a,b) => a-b);
            const minDate = dates[0];
            const maxDate = dates[dates.length - 1];

            // Preenche inputs de data
            document.getElementById('dateStart').max = document.getElementById('dateEnd').max = maxDate.toISOString().slice(0,10);
            document.getElementById('dateStart').min = document.getElementById('dateEnd').min = minDate.toISOString().slice(0,10);
            document.getElementById('dateStart').value = minDate.toISOString().slice(0,10);
            document.getElementById('dateEnd').value = maxDate.toISOString().slice(0,10);

            // Configura botões
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeRange = btn.dataset.range;
                    const cr = document.getElementById('customRange');
                    if (activeRange === 'custom') cr.classList.add('visible');
                    else { cr.classList.remove('visible'); applyRange(activeRange, maxDate); }
                });
            });

            applyRange('month', maxDate);
        }

        function applyRange(range, refDate) {
            const allDays = getAllDailyContent().map(d => parseLinkedInDate(d.date)).filter(Boolean).sort((a,b) => a-b);
            const maxDate = refDate || allDays[allDays.length - 1];
            const minDate = allDays[0];
            let start, end;
            end = maxDate;
            if (range === '2weeks') { start = new Date(maxDate); start.setDate(start.getDate() - 13); }
            else if (range === 'month') { start = new Date(maxDate.getFullYear(), maxDate.getMonth(), 1); }
            else if (range === 'quarter') { start = new Date(maxDate); start.setMonth(start.getMonth() - 2); start.setDate(1); }
            else { start = minDate; end = maxDate; } // 'all'
            currentStartDate = start;
            currentEndDate = end;
            renderDashboard();
        }

        function applyCustomRange() {
            const s = document.getElementById('dateStart').value;
            const e = document.getElementById('dateEnd').value;
            if (!s || !e) return;
            currentStartDate = parseLinkedInDate(s);
            currentEndDate = parseLinkedInDate(e);
            renderDashboard();
        }

        // ─── EXTRAÇÃO DE DADOS FILTRADOS ─────────────────────────────────────
        function getAllDailyContent() {
            const out = [];
            for (const m of Object.values(rawData.months || {})) out.push(...(m.content?.daily || []));
            return out;
        }

        function getAllDailyFollowers() {
            const out = [];
            for (const m of Object.values(rawData.months || {})) out.push(...(m.followers?.daily || []));
            return out;
        }

        function getAllDailyVisitors() {
            const out = [];
            for (const m of Object.values(rawData.months || {})) out.push(...(m.visitors?.daily || []));
            return out;
        }

        function filterByRange(days) {
            return days.filter(d => {
                const dt = parseLinkedInDate(d.date);
                return dt && dt >= currentStartDate && dt <= currentEndDate;
            }).sort((a,b) => parseLinkedInDate(a.date) - parseLinkedInDate(b.date));
        }

        function getDemographicsForRange() {
            // Retorna snapshot do mês mais recente dentro do range
            const monthKeys = Object.keys(rawData.months || {}).sort();
            let best = null;
            for (const mk of monthKeys) {
                const [y, m] = mk.split('-').map(Number);
                const monthStart = new Date(y, m - 1, 1);
                const monthEnd = new Date(y, m, 0);
                if (monthStart <= currentEndDate && monthEnd >= currentStartDate) best = mk;
            }
            if (!best) return { followers: {}, visitors: {} };
            return {
                followers: rawData.months[best]?.followers?.demographics || {},
                visitors: rawData.months[best]?.visitors?.demographics || {}
            };
        }

        function getAnalysisForRange() {
            const monthKeys = Object.keys(rawData.analysis || {}).sort();
            let best = null;
            for (const mk of monthKeys) {
                const [y, m] = mk.split('-').map(Number);
                const monthStart = new Date(y, m - 1, 1);
                const monthEnd = new Date(y, m, 0);
                if (monthStart <= currentEndDate && monthEnd >= currentStartDate) best = mk;
            }
            return best ? rawData.analysis[best] : null;
        }

        function getPostsForRange() {
            const allPosts = [];
            for (const m of Object.values(rawData.months || {})) allPosts.push(...(m.content?.posts || []));
            return allPosts.filter(p => {
                const dt = parseLinkedInDate(p['Criação'] || '');
                return dt && dt >= currentStartDate && dt <= currentEndDate;
            });
        }

        function computeKPIs(contentDays, followerDays, visitorDays) {
            const sum = (arr, key) => arr.reduce((a,b) => a + (b[key] || 0), 0);
            const impressions = sum(contentDays, 'Impressões (total)');
            const clicks = sum(contentDays, 'Cliques (total)');
            const reactions = sum(contentDays, 'Reações (total)');
            const comments = sum(contentDays, 'Comentários (total)');
            const shares = sum(contentDays, 'Compartilhamentos (total)');
            const newFollowers = sum(followerDays, 'total');
            const pageViews = sum(visitorDays, 'Total de visualizações da página (total)');
            const uniqueVisitors = sum(visitorDays, 'Total de visitantes únicos (total)');
            const avgEngagement = impressions > 0 ? (reactions + clicks + comments + shares) / impressions : 0;
            return { impressions, clicks, reactions, comments, shares, newFollowers, pageViews, uniqueVisitors, avgEngagement };
        }

        // ─── RENDERIZAÇÃO PRINCIPAL ───────────────────────────────────────────
        function renderDashboard() {
            const contentDays = filterByRange(getAllDailyContent());
            const followerDays = filterByRange(getAllDailyFollowers());
            const visitorDays = filterByRange(getAllDailyVisitors());
            const kpis = computeKPIs(contentDays, followerDays, visitorDays);
            const demo = getDemographicsForRange();
            const analysis = getAnalysisForRange();
            const posts = getPostsForRange();

            document.getElementById('rangeDisplay').textContent =
                `${formatDisplayDate(currentStartDate)} → ${formatDisplayDate(currentEndDate)}`;

            renderKPIs(kpis);
            renderOverviewTab(contentDays, followerDays, posts);
            renderContentTab(posts, analysis);
            renderAudienceTab(demo.followers);
            renderVisitorsTab(visitorDays, demo.visitors);
            renderAnalysisTab(analysis);
        }

        // ─── KPIs ─────────────────────────────────────────────────────────────
        function renderKPIs(kpis) {
            const cards = [
                { label: 'Impressões',        value: kpis.impressions },
                { label: 'Cliques',           value: kpis.clicks },
                { label: 'Reações',           value: kpis.reactions },
                { label: 'Novos Seguidores',  value: kpis.newFollowers },
                { label: 'Taxa de Engajamento', value: (kpis.avgEngagement * 100).toFixed(2) + '%' },
                { label: 'Visitantes Únicos', value: kpis.uniqueVisitors }
            ];
            document.getElementById('kpiGrid').innerHTML = cards.map(c =>
                `<div class="kpi-card"><div class="kpi-label">${c.label}</div><div class="kpi-value">${formatNumber(c.value)}</div><div class="kpi-delta">—</div></div>`
            ).join('');
        }

        // ─── ABA VISÃO GERAL ──────────────────────────────────────────────────
        // Retorna arrays de cor/tamanho de ponto: vermelho e grande nos dias de post
        function postMarkers(labels, postDateSet) {
            const colors  = labels.map(l => postDateSet.has(l) ? '#f85149' : '#00A86B');
            const radii   = labels.map(l => postDateSet.has(l) ? 7 : 3);
            const borders = labels.map(l => postDateSet.has(l) ? '#ff6b6b' : '#00A86B');
            return { colors, radii, borders };
        }

        function renderOverviewTab(contentDays, followerDays, posts) {
            const labels = contentDays.map(d => formatChartDate(d.date));
            const impressions = contentDays.map(d => d['Impressões (total)'] || 0);
            const engagement  = contentDays.map(d => (d['Taxa de engajamento (total)'] || 0) * 100);
            const followers     = followerDays.map(d => d.organic || 0);
            const followerLabels = followerDays.map(d => formatChartDate(d.date));

            // Set de datas com post (formato DD/MM para comparar com labels)
            const postDateSet = new Set((posts || []).map(p => formatChartDate(p['Criação'] || '')).filter(Boolean));

            const pm = postMarkers(labels, postDateSet);
            const pmF = postMarkers(followerLabels, postDateSet);

            // Legenda customizada nos títulos
            const legendNote = postDateSet.size > 0 ? ' (🔴 = post publicado)' : '';

            renderChart('impressionsChart', {
                type: 'line',
                data: { labels, datasets: [{
                    label: 'Impressões', data: impressions,
                    borderColor: '#00A86B', backgroundColor: 'rgba(0,168,107,0.1)',
                    tension: 0.3, fill: true,
                    pointBackgroundColor: pm.colors,
                    pointBorderColor: pm.borders,
                    pointRadius: pm.radii,
                    pointHoverRadius: pm.radii.map(r => r + 2)
                }] },
                options: cfgWithTitle('Impressões Diárias' + legendNote, { plugins: { legend: { display: false } } })
            });

            renderChart('engagementChart', {
                type: 'line',
                data: { labels, datasets: [{
                    label: 'Engajamento %', data: engagement,
                    borderColor: '#00A86B', backgroundColor: 'rgba(0,168,107,0.1)',
                    tension: 0.3, fill: true,
                    pointBackgroundColor: pm.colors,
                    pointBorderColor: pm.borders,
                    pointRadius: pm.radii,
                    pointHoverRadius: pm.radii.map(r => r + 2)
                }] },
                options: cfgWithTitle('Taxa de Engajamento (%)' + legendNote, { plugins: { legend: { display: false } } })
            });

            // Gráfico de barras: barra vermelha nos dias de post
            const barColors  = followerLabels.map(l => postDateSet.has(l) ? 'rgba(248,81,73,0.75)' : 'rgba(0,168,107,0.6)');
            const barBorders = followerLabels.map(l => postDateSet.has(l) ? '#f85149' : '#00A86B');
            renderChart('followersChart', {
                type: 'bar',
                data: { labels: followerLabels, datasets: [{
                    label: 'Novos Seguidores', data: followers,
                    backgroundColor: barColors, borderColor: barBorders, borderWidth: 1
                }] },
                options: cfgWithTitle('Novos Seguidores Orgânicos por Dia' + legendNote, { plugins: { legend: { display: false } } })
            });
        }

        // ─── ABA CONTEÚDO ─────────────────────────────────────────────────────
        function renderContentTab(posts, analysis) {
            const sorted = [...posts].sort((a,b) => (b['Taxa de engajamento'] || 0) - (a['Taxa de engajamento'] || 0));
            document.getElementById('contentTableBody').innerHTML = sorted.length
                ? sorted.map(p => {
                    const title = (p['Título da publicação'] || '').substring(0, 55);
                    return `<tr>
                        <td title="${p['Título da publicação'] || ''}">${title}${(p['Título da publicação']||'').length > 55 ? '...' : ''}</td>
                        <td>${formatChartDate(p['Criação'] || '')}</td>
                        <td>${formatNumber(p['Impressões'] || 0)}</td>
                        <td>${formatNumber(p['Cliques'] || 0)}</td>
                        <td>${formatNumber(p['Gostaram'] || 0)}</td>
                        <td>${formatNumber(p['Comentários'] || 0)}</td>
                        <td>${formatNumber(p['Compartilhamentos'] || 0)}</td>
                        <td>${((p['Taxa de engajamento'] || 0) * 100).toFixed(2)}%</td>
                    </tr>`;
                }).join('')
                : `<tr><td colspan="8" style="text-align:center;color:var(--text-secondary)">Nenhum post no período selecionado</td></tr>`;

            const insights = analysis?.postAnalysis || [];
            document.getElementById('postsInsights').innerHTML = insights.length
                ? insights.map(p => `<div class="post-insight"><strong>${p.title}</strong><br>${p.insight || ''}</div>`).join('')
                : '<div class="no-data">Análise de posts disponível apenas para meses completos</div>';
        }

        // ─── ABA AUDIÊNCIA ────────────────────────────────────────────────────
        function renderAudienceTab(demo) {
            renderHBar('locationsChart',  demo['Localidade'] || [],          'Top 10 Localidades dos Seguidores');
            renderHBar('functionsChart',  demo['Função'] || [],              'Funções dos Seguidores');
            renderDonut('experienceChart', demo['Nível de experiência'] || [],'Nível de Experiência dos Seguidores');
            renderHBar('sectorsChart',    (demo['Setor'] || []).slice(0,10), 'Top 10 Setores dos Seguidores');
            renderBar('companySizeChart', demo['Tamanho da empresa'] || [],  'Tamanho das Empresas dos Seguidores');
        }

        // ─── ABA VISITANTES ───────────────────────────────────────────────────
        function renderVisitorsTab(visitorDays, demo) {
            const labels = visitorDays.map(d => formatChartDate(d.date));
            const desktop = visitorDays.map(d => d['Total de visualizações da página (computadores)'] || 0);
            const mobile = visitorDays.map(d => {
                const key = Object.keys(d).find(k => k.startsWith('Total de visualizações da página (dispositivos mó'));
                return d[key] || 0;
            });
            const unique = visitorDays.map(d => d['Total de visitantes únicos (total)'] || 0);

            renderChart('pageViewsChart', {
                type: 'line',
                data: { labels, datasets: [
                    { label: 'Desktop', data: desktop, borderColor: '#00A86B', tension: 0.3, fill: false },
                    { label: 'Mobile',  data: mobile,  borderColor: '#006B3F', tension: 0.3, fill: false }
                ] },
                options: cfgWithTitle('Visualizações de Página — Desktop vs Mobile')
            });

            renderChart('uniqueVisitorsChart', {
                type: 'line',
                data: { labels, datasets: [{ label: 'Visitantes Únicos', data: unique, borderColor: '#00A86B', backgroundColor: 'rgba(0,168,107,0.1)', tension: 0.3, fill: true }] },
                options: cfgWithTitle('Visitantes Únicos por Dia', { plugins: { legend: { display: false } } })
            });

            renderHBar('visitorLocationsChart', demo['Localidade'] || [],          'Localidades dos Visitantes');
            renderHBar('visitorFunctionsChart', demo['Função'] || [],              'Funções dos Visitantes');
            renderDonut('visitorExperienceChart', demo['Nível de experiência'] || [],'Nível de Experiência dos Visitantes');
            renderHBar('visitorSectorsChart',   (demo['Setor'] || []).slice(0,10), 'Top 10 Setores dos Visitantes');
            renderBar('visitorCompanySizeChart', demo['Tamanho da empresa'] || [], 'Tamanho das Empresas (Visitantes)');
        }

        // ─── ABA ANÁLISE ──────────────────────────────────────────────────────
        function renderAnalysisTab(analysis) {
            const el = document.getElementById('analysisContent');
            if (!analysis) { el.innerHTML = '<div class="no-data">Análise estratégica disponível para meses completos. Selecione um período que inclua um mês inteiro.</div>'; return; }
            let html = '';
            if (analysis.summary) html += `<div class="summary-block"><strong>Resumo da Performance:</strong><br><br>${analysis.summary}</div>`;
            if (analysis.trends?.length) {
                html += '<h3 class="section-title">Tendências</h3><div class="insights-cards">';
                html += analysis.trends.map(t => `<div class="insight-card"><div class="insight-card-icon">📈</div><div class="insight-card-content"><div class="insight-card-title">${t.title}</div><div class="insight-card-detail">${t.detail}</div></div></div>`).join('');
                html += '</div>';
            }
            if (analysis.audienceInsights) {
                html += `<h3 class="section-title">Perfil da Audiência</h3><div class="summary-block">${analysis.audienceInsights.summary || ''}</div>`;
                if (analysis.audienceInsights.highlights?.length) {
                    html += '<div class="insights-cards">' + analysis.audienceInsights.highlights.map((h,i) =>
                        `<div class="insight-card"><div class="insight-card-icon">👥</div><div class="insight-card-content"><div class="insight-card-title">Destaque ${i+1}</div><div class="insight-card-detail">${h.detail || h}</div></div></div>`
                    ).join('') + '</div>';
                }
            }
            if (analysis.visitorInsights) html += `<h3 class="section-title">Insights de Visitantes</h3><div class="summary-block">${analysis.visitorInsights}</div>`;
            if (analysis.competitiveBenchmarks) {
                html += '<h3 class="section-title">Benchmarks Competitivos</h3>';
                if (analysis.competitiveBenchmarks.note) html += `<div class="benchmark-note">${analysis.competitiveBenchmarks.note}</div>`;
                html += '<div class="table-responsive"><table><thead><tr><th>Métrica</th><th>INOVA</th><th>Benchmark</th><th>Status</th></tr></thead><tbody>';
                (analysis.competitiveBenchmarks.data || []).forEach(r => {
                    html += `<tr><td>${r.metric}</td><td><strong>${r.inova}</strong></td><td>${r.benchmark}</td><td><span class="status-badge ${r.status}">${r.status}</span></td></tr>`;
                });
                html += '</tbody></table></div>';
            }
            if (analysis.recommendations?.length) {
                html += '<h3 class="section-title">Recomendações</h3><div class="recommendations-list"><ol>';
                analysis.recommendations.forEach(r => { html += `<li>${r}</li>`; });
                html += '</ol></div>';
            }
            el.innerHTML = html;
        }

        // ─── HELPERS DE GRÁFICO ───────────────────────────────────────────────
        function renderChart(id, config) {
            const canvas = document.getElementById(id);
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(canvas, config);
        }

        const COLORS = ['rgba(0,168,107,0.8)','rgba(0,107,63,0.8)','rgba(0,168,107,0.5)','rgba(0,107,63,0.5)','rgba(0,168,107,0.3)'];

        function renderHBar(id, data, title) {
            const sorted = [...(data||[])].sort((a,b) => b.value - a.value).slice(0,10);
            renderChart(id, {
                type: 'bar',
                data: { labels: sorted.map(d=>d.label), datasets: [{ label: title, data: sorted.map(d=>d.value), backgroundColor: 'rgba(0,168,107,0.6)', borderColor: '#00A86B' }] },
                options: cfgWithTitle(title, { indexAxis: 'y', plugins: { legend: { display: false } } })
            });
        }

        function renderBar(id, data, title) {
            renderChart(id, {
                type: 'bar',
                data: { labels: (data||[]).map(d=>d.label), datasets: [{ label: title, data: (data||[]).map(d=>d.value), backgroundColor: 'rgba(0,168,107,0.6)', borderColor: '#00A86B' }] },
                options: cfgWithTitle(title, { plugins: { legend: { display: false } } })
            });
        }

        function renderDonut(id, data, title) {
            renderChart(id, {
                type: 'doughnut',
                data: { labels: (data||[]).map(d=>d.label), datasets: [{ data: (data||[]).map(d=>d.value), backgroundColor: COLORS, borderColor: '#161b22', borderWidth: 2 }] },
                options: { ...cfgWithTitle(title), scales: {}, plugins: { ...cfgWithTitle(title).plugins, legend: { position: 'bottom', labels: { color: '#8b949e', font: { size: 10 } } } } }
            });
        }

        // ─── FORMAT ───────────────────────────────────────────────────────────
        function formatNumber(n) {
            if (typeof n === 'string') return n;
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
            if (n >= 1000) return (n/1000).toFixed(1) + 'K';
            return n.toLocaleString('pt-BR');
        }

        // ─── TABS ─────────────────────────────────────────────────────────────
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        loadData();
    </script>
</body>
</html>
